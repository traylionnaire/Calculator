<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculator</title>

  <script src="script.js" defer></script>
</head>
<body>
  <div id="container">
    <input id="input" type="text" value="0">
    <div id="btn-container">
      <div class="btn-section-container">
        <button id="clear-btn">CE</button>
        <button id="backspace-btn">&#x232B;</button>
        <button id="negative-btn">+/-</button>
        <button class="operator-btn" value="/">&divide;</button>
      </div>
      <div class="btn-section-container">
        <button class="number-btn">7</button>
        <button class="number-btn">8</button>
        <button class="number-btn">9</button>
        <button class="operator-btn" value="*">&times;</button>
      </div>
      <div class="btn-section-container">
        <button class="number-btn">4</button>
        <button class="number-btn">5</button>
        <button class="number-btn">6</button>
        <button class="operator-btn" value="-">&minus;</button>
      </div>
      <div class="btn-section-container">
        <button class="number-btn">1</button>
        <button class="number-btn">2</button>
        <button class="number-btn">3</button>
        <button class="operator-btn" value="+">&plus;</button>
      </div>
      <div class="btn-section-container">
        <button class="number-btn">0</button>
        <button id="decimal-btn">.</button>
        <button id="equal-btn">=</button>
      </div>
    </div>
  </div>
</body>
</html>
